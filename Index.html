<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060b14;color:#e2e8f0;font-family:-apple-system,'Helvetica Neue',sans-serif;max-width:430px;margin:0 auto}

.sec-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}

function isDueToday(med){
if(med.interval==='daily')return true;
if(med.interval==='every2'||med.interval==='every3'){
if(!med.startDate)return true;
var diff=Math.floor((new Date()-new Date(med.startDate))/86400000);
return diff%(med.interval==='every2'?2:3)===0;}
if(med.interval==='weekly'){if(!med.startDate)return false;
return Math.floor((new Date()-new Date(med.startDate))/86400000)%7===0;}
if(med.interval==='weekdays')return(med.weekdays||[]).indexOf(todayIdx())>=0;
return false;}
function isTaken(medId,time){return!!((logData[todayKey()]||{})[medId+'_'+time])}
function toggleTaken(medId,time){
var k=todayKey(),ek=medId+'_'+time;

if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();

o.start(ctx.currentTime+x[1]);o.stop(ctx.currentTime+x[1]+x[2]+.05);});}catch(e){}}

n.onclick=function(){window.focus();n.close()};}
function checkAlarms(){
var now=new Date(),k=todayKey(),nowM=now.getHours()*60+now.getMinutes();
